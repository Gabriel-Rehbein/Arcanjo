<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-M-R - IA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <h2>G-M-R </h2>
        <div class="chat-box" id="chat-box"></div>

        <!-- Campo de entrada -->
        <div class="input-container">
            <input type="text" id="inputText" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendButton">Enviar</button>
            <button id="voiceButton">🎤</button>
        </div>

        <!-- Alternar voz da IA -->
        <div class="voice-toggle">
            <input type="checkbox" id="voiceToggle">
            <label for="voiceToggle">Ativar voz da IA 🔊</label>
        </div>
    </div>

    <!-- 🔥 Agora o script.js será carregado após o HTML -->
    <script src="responses.js"></script> 
    <script src="script.js"></script>

</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GabNet — Configurações da Conta</title>
  <link rel="stylesheet" href="css/account_settings.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">GabNet</div>
    <nav class="nav">
      <a href="profiles.html" class="btn-secondary">Voltar aos perfis</a>
      <a href="home.html" class="btn-secondary">Início</a>
    </nav>
  </header>

  <main class="wrap">
    <h1>Configurações da Conta</h1>

    <section class="card">
      <h2>Trocar senha</h2>
      <form id="pwdForm" class="form">
        <div class="field">
          <label for="currentPwd">Senha atual</label>
          <input id="currentPwd" type="password" required>
        </div>
        <div class="field">
          <label for="newPwd">Nova senha</label>
          <input id="newPwd" type="password" minlength="6" required>
        </div>
        <div class="field">
          <label for="newPwd2">Confirmar nova senha</label>
          <input id="newPwd2" type="password" minlength="6" required>
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit">Salvar nova senha</button>
        </div>
        <p id="pwdMsg" class="msg" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="js/account_settings.js"></script>
</body>
</html>

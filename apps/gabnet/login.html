<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GabNet — Entrar</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <header class="topbar"><h1>GabNet</h1></header>

  <main class="centered">
    <section class="panel">
      <h2>Entrar</h2>
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="voce@exemplo.com"></div>
      <div class="field"><label>Senha</label><input id="pass" type="password" placeholder="••••••••"></div>
      <button id="loginBtn" class="btn-primary">Entrar</button>

      <hr>
      <h3>Criar conta</h3>
      <div class="field"><label>Novo Email</label><input id="nEmail" type="email"></div>
      <div class="field"><label>Senha</label><input id="nPass" type="password"></div>
      <button id="signupBtn" class="btn-secondary">Criar</button>
      <p class="muted small">* Autenticação local (apenas para testes).</p>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>

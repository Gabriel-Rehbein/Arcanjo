<!doctype html>
<html lang="pt-br">

  <title>Arcanjo • Dashboard</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="bg">

    // Logout retorna ao dashboard principal
    function logout() {
      localStorage.removeItem("arcanjo_auth");
      location.href = "../../dashboard.html";
    }
  </script>

<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="./img/logoaba.png" type="image/png" />
  <title>Arcanjo • Rede Social de Projetos</title>
  <link rel="stylesheet" href="css/feed.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsivefeed.css" />
  <link rel="stylesheet" href="js/feed.js" />
</head>

<body class="bg">
  <header class="top">
    <div class="wrap topbar">
      <div>
        <h2 class="title">AR<span>CANJO</span></h2>
        <p class="muted small">Feed de Portfólios</p>
      </div>

      <div class="actions">
        <a href="dashboard.html" class="btn ghost">Dashboard</a>
        <a href="profile.html" class="btn ghost">Perfil</a>
        <a href="settings.html" class="btn ghost">Configurações</a>
      </div>
    </div>
  </header>

  <main class="wrap feed-page">
    <section class="feed-hero">
      <div class="feed-hero-content">
        <span class="feed-badge">Rede Social de Portfólios</span>
        <h1>Mural de Projetos do Arcanjo</h1>
        <p>
          Descubra sistemas, trabalhos acadêmicos, protótipos e soluções criadas pela comunidade.
        </p>
      </div>
    </section>

    <section class="feed-toolbar">
      <input type="text" id="searchInput" class="input" placeholder="Buscar projeto, tecnologia ou autor..." />

      <select id="typeFilter" class="input">
        <option value="">Todos os tipos</option>
        <option value="Projeto">Projeto</option>
        <option value="Trabalho Acadêmico">Trabalho Acadêmico</option>
        <option value="Protótipo">Protótipo</option>
        <option value="Case Study">Case Study</option>
      </select>

      <select id="orderFilter" class="input">
        <option value="recent">Mais recentes</option>
        <option value="liked">Mais curtidos</option>
        <option value="comments">Mais comentados</option>
      </select>
    </section>

    <section id="feedList" class="feed-list"></section>
  </main>

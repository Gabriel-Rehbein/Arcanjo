<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="./img/logoaba.png" type="image/png" />
  <title>Arcanjo • Mensagens</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/resposive.css" />
  <link rel="stylesheet" href="css/messages.css" />

</head>

<body class="bg">
  <header class="top">
    <div class="wrap topbar">
      <div>
        <h2 class="title">AR<span>CANJO</span></h2>
        <p class="muted small">Mensagens</p>
      </div>
      <div class="actions">
        <a href="dashboard.html" class="btn ghost">← Voltar</a>
      </div>
    </div>
  </header>

  <main class="wrap messages-container">
    <div class="chat-header">
      <label for="userSelect">Conversar com:</label>
      <select id="userSelect">
        <option value="">-- escolha um usuário --</option>
      </select>
    </div>

    <div id="chatBox" class="chat-box">
      <div class="chat-empty">Selecione um usuário para começar a conversar.</div>
    </div>

    <div class="chat-helper">
      Enter envia a mensagem. Shift + Enter quebra linha.
    </div>

    <div class="input-area">
      <textarea id="messageInput" placeholder="Digite sua mensagem..." disabled></textarea>
      <button id="sendBtn" disabled>Enviar</button>
    </div>
  </main>

  <script src="js/api.js"></script>
  <div id="globalFooter"></div>
  <script src="js/footer-nav.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/feedanimation.js"></script>
</body>

</html>

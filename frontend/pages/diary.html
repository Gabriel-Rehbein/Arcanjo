<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="./img/logoaba.png" type="image/png" />
  <title>Arcanjo • Diário</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/footer-nav.css" />
  <link rel="stylesheet" href="css/resposive.css" />
  <style>
    .diary-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .diary-header {
      margin-bottom: 2rem;
      padding: 2rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
      border-radius: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .diary-header h1 {
      margin: 0 0 0.5rem 0;
      font-size: 2rem;
    }

    .diary-header p {
      margin: 0;
      color: #a5b4fc;
      font-size: 0.95rem;
    }

    .date-display {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(99, 102, 241, 0.3);
      font-size: 0.9rem;
      color: #8ab4ff;
    }

    .diary-entries {
      display: grid;
      gap: 1.5rem;
    }

    .entry-card {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 1rem;
      padding: 1.5rem;
      position: relative;
    }

    .entry-date {
      font-size: 0.85rem;
      color: #8ab4ff;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .entry-content {
      color: #e8eef7;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .entry-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(99, 102, 241, 0.2);
    }

    .entry-actions button {
      flex: 1;
      padding: 0.5rem;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .entry-actions button:hover {
      background: rgba(99, 102, 241, 0.4);
      color: #fff;
    }

    .diary-form {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #e8eef7;
      font-weight: 600;
    }

    .form-group textarea {
      width: 100%;
      min-height: 150px;
      padding: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 0.5rem;
      background: rgba(11, 15, 20, 0.5);
      color: #e8eef7;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .form-group textarea:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(11, 15, 20, 0.8);
    }

    .char-count {
      font-size: 0.85rem;
      color: #8ab4ff;
      margin-top: 0.3rem;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .form-actions button {
      flex: 1;
      min-width: 150px;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #86efac;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .no-entries {
      text-align: center;
      padding: 3rem 1rem;
      color: #8ab4ff;
    }

    .no-entries p {
      margin: 0;
      font-size: 1.1rem;
    }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filters input {
      flex: 1;
      min-width: 200px;
      padding: 0.75rem;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 0.5rem;
      background: rgba(11, 15, 20, 0.5);
      color: #e8eef7;
      font-size: 0.95rem;
    }

    .filters input:focus {
      outline: none;
      border-color: #6366f1;
    }

    .filters input::placeholder {
      color: #6b7280;
    }

    .edit-form {
      display: none;
      background: rgba(99, 102, 241, 0.1);
      padding: 1.5rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .edit-form.show {
      display: block;
    }

    .edit-form textarea {
      width: 100%;
      min-height: 100px;
      padding: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 0.5rem;
      background: rgba(11, 15, 20, 0.5);
      color: #e8eef7;
      font-family: inherit;
      margin-bottom: 1rem;
    }

    .edit-form textarea:focus {
      outline: none;
      border-color: #6366f1;
    }

    .edit-actions {
      display: flex;
      gap: 0.5rem;
    }

    .edit-actions button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }

    .edit-actions .save {
      background: #6366f1;
      color: white;
    }

    .edit-actions .cancel {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
    }
  </style>
</head>

<body class="bg">
  <header class="top">
    <div class="wrap topbar">
      <div>
        <h2 class="title">AR<span>CANJO</span></h2>
        <p class="muted small">Seu Diário</p>
      </div>
      <div class="actions">
        <button id="shareDiaryBtn" class="btn">📤 Compartilhar</button>
        <a href="dashboard.html" class="btn ghost">← Voltar</a>
      </div>
    </div>
  </header>

  <main class="wrap diary-container">
    <div class="diary-header">
      <h1>📔 Meu Diário</h1>
      <p>Escreva seus pensamentos, reflexões e anotações diárias</p>
      <div class="date-display">
        <strong>Hoje:</strong> <span id="todayDate"></span>
      </div>
    </div>

    <div id="successMessage" class="success-message">✅ Entrada salva com sucesso!</div>

    <div class="diary-form">
      <h3 style="margin-top: 0; color: #e8eef7;">Escrever Nova Entrada</h3>
      <form id="diaryForm">
        <div class="form-group">
          <label for="diaryContent">O que está em sua mente?</label>
          <textarea id="diaryContent" placeholder="Escreva seus pensamentos aqui..." required></textarea>
          <div class="char-count">
            <span id="charCount">0</span> / 2000 caracteres
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn">💾 Salvar Entrada</button>
          <button type="reset" class="btn ghost">🗑️ Limpar</button>
        </div>
      </form>
    </div>

    <div class="filters">
      <input type="text" id="searchFilter" placeholder="🔍 Buscar nas entradas..." />
    </div>

    <div id="entriesList" class="diary-entries">
      <div class="no-entries">
        <p>📝 Nenhuma entrada ainda. Comece a escrever!</p>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <div id="globalFooter"></div>
  <script src="js/footer-nav.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/feedanimation.js"></script>
</body>

</html>

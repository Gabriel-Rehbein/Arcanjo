<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="/img/logoaba.png" type="image/png" />
  <title>Arcanjo • Perfil</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/footer-nav.css" />
  <link rel="stylesheet" href="/css/resposive.css" />
  <style>
    .profile-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 3rem;
      padding: 2rem;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
      border-radius: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1rem;
      border: 3px solid rgba(99, 102, 241, 0.3);
    }

    .profile-header h1 {
      margin: 0.5rem 0;
      font-size: 2rem;
    }

    .profile-header p {
      margin: 0.5rem 0;
      color: #a5b4fc;
    }

    .profile-form {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #e8eef7;
      font-weight: 600;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 0.5rem;
      background: rgba(11, 15, 20, 0.5);
      color: #e8eef7;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #6366f1;
      background: rgba(11, 15, 20, 0.8);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .form-hint {
      font-size: 0.85rem;
      color: #8ab4ff;
      margin-top: 0.3rem;
    }

    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .btn-group button {
      flex: 1;
      min-width: 150px;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #86efac;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .info-box {
      background: rgba(59, 130, 246, 0.1);
      border-left: 4px solid #3b82f6;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      color: #93c5fd;
    }

    .readonly {
      opacity: 0.6;
      cursor: not-allowed;
      background: rgba(11, 15, 20, 0.8) !important;
    }
  </style>
</head>

<body class="bg">
  <header class="top">
    <div class="wrap topbar">
      <div>
        <h2 class="title">AR<span>CANJO</span></h2>
        <p class="muted small">Seu Perfil</p>
      </div>
      <div class="actions">
        <button id="shareProfileBtn" class="btn">📤 Compartilhar Perfil</button>
        <a href="dashboard.html" class="btn ghost">← Voltar</a>
      </div>
    </div>
  </header>

  <main class="wrap profile-container">
    <div class="profile-header">
      <img id="profileAvatar" class="profile-avatar-img" src="/img/logoaba.png" alt="Avatar do usuário">
      <h1 id="profileUsername">Usuário</h1>
      <p id="profileMemberSince">Membro desde -</p>
    </div>

    <div id="successMessage" class="success-message">✅ Perfil atualizado com sucesso!</div>

    <div class="info-box">
      ℹ️ <strong>Nota:</strong> Seu nome de usuário não pode ser alterado. Para editar outras informações, use o
      formulário abaixo.
    </div>

    <form id="profileForm" class="profile-form">
      <h2 style="margin-top: 0; margin-bottom: 1.5rem;">Informações Pessoais</h2>

      <div class="form-group">
        <label for="profileBio">Bio / Descrição</label>
        <textarea id="profileBio" placeholder="Conte um pouco sobre você..."></textarea>
        <div class="form-hint">Máximo 500 caracteres</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="profileLocation">Localização</label>
          <input type="text" id="profileLocation" placeholder="Ex: São Paulo, Brasil">
        </div>
        <div class="form-group">
          <label for="profileOccupation">Profissão</label>
          <input type="text" id="profileOccupation" placeholder="Ex: Desenvolvedor">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="profileWebsite">Website</label>
          <input type="url" id="profileWebsite" placeholder="https://seu-site.com">
        </div>
        <div class="form-group">
          <label for="profileGithub">GitHub</label>
          <input type="text" id="profileGithub" placeholder="seu-usuario">
        </div>
      </div>

      <div class="form-group">
        <label for="profileEmail">Email de Contato</label>
        <input type="email" id="profileEmail" placeholder="seu@email.com">
      </div>

      <div class="btn-group">
        <button type="submit" class="btn">💾 Salvar Perfil</button>
        <button type="button" class="btn ghost" onclick="location.href='dashboard.html'">❌ Cancelar</button>
      </div>
    </form>
  </main>

  <!-- botão de direct no canto inferior direito -->
  <a id="directBtn" class="direct-btn" href="#" title="Enviar mensagem">✈️</a>

  <style>
    .direct-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: #f97316;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.5rem;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 1000;
    }

    .direct-btn:hover {
      background: #f59e0b;
    }
  </style>

  <script src="/js/api.js"></script>
  <div id="globalFooter"></div>
  <script src="/js/footer-nav.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/feedanimation.js"></script>
</body>

</html>
